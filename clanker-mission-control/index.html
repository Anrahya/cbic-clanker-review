<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLANKER_ZONE</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "surface": "#faf9f5", // Creamy paper off-white
              "surface-panel": "#f0ede6", // Slightly deeper beige
              "surface-card": "#ffffff", // Crisp white
              "text-primary": "#292524", // Stone 900 / Espresso
              "text-secondary": "#78716c", // Stone 500
              "border-subtle": "#e7e5df", // Soft beige border
              "primary-accent": "#c2410c", // Deep rust orange
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "mono": ["JetBrains Mono"],
            },
            boxShadow: {
              "soft": "0 4px 20px -2px rgba(41, 37, 36, 0.05)",
              "card": "0 2px 8px -1px rgba(41, 37, 36, 0.03)",
            }
          },
        },
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
        vertical-align: middle;
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
      .grid-bg {
        background-color: #faf9f5;
        background-image: radial-gradient(circle, rgba(41, 37, 36, 0.06) 1px, transparent 1px);
        background-size: 24px 24px;
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(194, 65, 12, 0.3); }
        50% { opacity: 0.5; box-shadow: 0 0 2px rgba(194, 65, 12, 0.1); }
      }
      .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    </style>
  </head>
  <body class="bg-surface text-text-primary font-body overflow-hidden antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
