services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    volumes:
      - ./data:/data
      - ./reports:/app/reports
    restart: unless-stopped

  frontend:
    build:
      context: ./clanker-mission-control
      dockerfile: Dockerfile
    ports:
      - "6969:80"
    depends_on:
      - backend
    restart: unless-stopped
